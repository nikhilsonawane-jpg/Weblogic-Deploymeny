name: Deploy to WebLogic

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Enter app to deploy'
        required: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Debug Environment
        run: |
          echo "Current directory:"
          pwd
          echo "List files:"
          ls -l
          echo "App folder:"
          ls -l app

      - name: Copy WAR to WebLogic Container
        run: |
          docker cp ./app/${{inputs.app}} weblogic1411:/u01/oracle/${{inputs.app}}

      - name: Copy WLST Script
        run: |
          docker cp ./wlst/deploy.py weblogic1411:/u01/oracle/deploy.py

      - name: Execute WLST Deployment
        run: |
          docker exec weblogic1411 bash -c "/u01/oracle/oracle_common/common/bin/wlst.sh /u01/oracle/deploy.py"

      - name: Check
        run: |
          curl http://172.17.0.2:7001/hello-world
